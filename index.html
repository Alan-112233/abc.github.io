<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录 - Faith Technology Energy Cloud</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, #0d1630 0%, #050816 45%, #02040d 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* 科技网格背景 */
        body::before {
            content: ''; position: fixed; inset: 0;
            background: linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px; pointer-events: none; z-index: -1;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            background: rgba(10, 18, 38, 0.7);
            border: 1px solid rgba(0, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .logo { font-size: 24px; font-weight: 800; letter-spacing: 2px; margin-bottom: 30px; color: #fff; }
        .logo span { color: #00ffff; }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 8px; }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(5, 8, 22, 0.7);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }
        .input-group input:focus { border-color: #00ffff; box-shadow: 0 0 10px rgba(0, 255, 255, 0.2); }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #00ffff, #00ffa2);
            border: none;
            border-radius: 8px;
            color: #050816;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            font-size: 15px;
        }
        .login-btn:hover { box-shadow: 0 0 20px rgba(0, 255, 255, 0.4); transform: translateY(-2px); }

        .error-hint {
            margin-top: 15px; color: #ff3366; font-size: 12px; opacity: 0; transition: 0.3s;
        }

        /* 登录框抖动动画 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .shake { animation: shake 0.3s ease-in-out; }

        .footer {
            margin-top: 30px; font-size: 10px; color: rgba(255, 255, 255, 0.2); letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="login-box" id="loginBox">
        <div class="logo">FAITH<span>TECH</span></div>
        <form onsubmit="handleLogin(event)">
            <div class="input-group">
                <label>OPERATOR ID</label>
                <input type="text" id="username" placeholder="请输入操作员账号" required>
            </div>
            <div class="input-group">
                <label>ENCRYPTION KEY</label>
                <input type="password" id="password" placeholder="请输入安全密钥" required>
            </div>
            <button type="submit" class="login-btn" id="loginBtn">登录能源云系统</button>
        </form>
        <div class="error-hint" id="errorHint">身份验证失败，请核对访问凭据</div>
        <div class="footer">
            SECURED BY FAITH TECHNOLOGY ENCRYPTION
        </div>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const hint = document.getElementById('errorHint');
            const box = document.getElementById('loginBox');

            hint.style.opacity = "0";
            box.classList.remove('shake');

            if (user === 'fskj' && pass === 'fskj8888') {
                btn.innerText = "AUTHENTICATING...";
                btn.style.pointerEvents = "none";
                btn.style.opacity = "0.7";
                
                setTimeout(() => {
                    location.href = 'home.html';
                }, 1000);
            } else {
                setTimeout(() => {
                    box.classList.add('shake');
                    hint.style.opacity = "1";
                    document.getElementById('password').value = '';
                }, 100);
            }
        }
    </script>
</body>
</html>
